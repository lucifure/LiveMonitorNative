name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Install imagemagick
        run: sudo apt-get install -y imagemagick

      - name: Convert and copy icons
        run: |
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          convert preview.webp -resize 72x72 app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert preview.webp -resize 96x96 app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert preview.webp -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert preview.webp -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Download yt-dlp and package as native library
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux_aarch64" -o app/src/main/jniLibs/arm64-v8a/libytdlp.so
          chmod +x app/src/main/jniLibs/arm64-v8a/libytdlp.so
          echo "yt-dlp size: $(wc -c < app/src/main/jniLibs/arm64-v8a/libytdlp.so) bytes"

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveMonitor-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
